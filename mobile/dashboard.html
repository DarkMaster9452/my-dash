<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>My Dashboard</title>
<style>
  :root {
    --text-primary: #FAFAFA;
    --text-secondary: #B8B6B0;
    --text-tertiary: #76746E;
    --success: #6BE3A4;
    --warning: #F2C063;
    --danger:  #FF6B6B;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #050506;
    color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    padding: max(env(safe-area-inset-top), 24px) 20px max(env(safe-area-inset-bottom), 32px);
    max-width: 1100px;
    margin: 0 auto;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background:
      radial-gradient(60% 60% at 82% 14%, rgba(224, 118, 88, 0.16), transparent 60%),
      radial-gradient(50% 50% at 18% 90%, rgba(180, 180, 200, 0.06), transparent 65%);
    filter: blur(40px);
    animation: bgDrift 36s ease-in-out infinite alternate;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image:
      radial-gradient(rgba(255,255,255,0.014) 1px, transparent 1px);
    background-size: 3px 3px;
    opacity: 1;
    mix-blend-mode: screen;
  }

  @keyframes bgDrift {
    0%   { transform: translate3d(0, 0, 0); }
    100% { transform: translate3d(-2%, 1.5%, 0); }
  }

  body > * { position: relative; z-index: 1; }

  /* ---------- Component 1: Page title ---------- */
  .dash-title {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.025em;
    margin: 0 0 14px 0;
    background: linear-gradient(180deg, #FFFFFF 0%, #C7C4BC 120%);
    -webkit-background-clip: text;
            background-clip: text;
    -webkit-text-fill-color: transparent;
    color: transparent;
  }

  @media (max-width: 480px) {
    .dash-title { font-size: 22px; }
  }

  /* ---------- Component 2: Goal Ticker ---------- */
  .ticker-row {
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-bottom: 18px;
  }

  .goal-ticker {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 12px;
    border-radius: 12px;
    background: linear-gradient(180deg, rgba(0,0,0,0.42) 0%, rgba(0,0,0,0.30) 100%);
    background-image:
      linear-gradient(180deg, rgba(0,0,0,0.42) 0%, rgba(0,0,0,0.30) 100%),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.025) 0, rgba(255,255,255,0.025) 1px, transparent 1px, transparent 3px);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
    position: relative;
    overflow: hidden;
  }

  .goal-ticker::after {
    content: '';
    position: absolute;
    top: 0;
    bottom: 0;
    width: 30%;
    left: -40%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);
    animation: tickerSweep 8s linear infinite;
    pointer-events: none;
  }

  @keyframes tickerSweep {
    0%   { left: -40%; }
    100% { left: 110%; }
  }

  .goal-ticker-led {
    display: flex; align-items: center; justify-content: center;
    width: 12px; height: 12px;
  }
  .goal-ticker-led-dot {
    display: block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #6BE3A4;
    box-shadow: 0 0 8px rgba(107,227,164,0.7);
    animation: ledPulse 1.6s ease-in-out infinite;
  }
  @keyframes ledPulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.45; transform: scale(0.85); }
  }

  .goal-ticker-label {
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 9.5px;
    font-weight: 800;
    letter-spacing: 0.18em;
    color: var(--text-tertiary);
    text-transform: uppercase;
  }

  .goal-ticker-stage {
    flex: 1;
    height: 22px;
    position: relative;
    overflow: hidden;
  }

  .goal-ticker-row {
    display: flex;
    align-items: center;
    gap: 8px;
    height: 22px;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 12.5px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    color: var(--text-primary);
    white-space: nowrap;
    position: absolute;
    inset: 0;
  }

  .goal-ticker-status {
    width: 18px;
    flex: 0 0 18px;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    color: var(--text-tertiary);
  }
  .goal-ticker-status[data-status="done"]    { color: #6BE3A4; }
  .goal-ticker-status[data-status="pending"] { color: var(--text-tertiary); }
  .goal-ticker-status[data-status="empty"]   { color: var(--text-tertiary); }

  .goal-ticker-text {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .goal-ticker-meta {
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 11px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    color: var(--text-secondary);
    letter-spacing: 0.04em;
    padding: 3px 8px;
    border-radius: 999px;
    background: rgba(255,255,255,0.04);
  }

  .goal-ticker-row.is-leaving  { animation: ticker-leave  0.45s cubic-bezier(0.55, 0, 0.55, 1) forwards; }
  .goal-ticker-row.is-entering { animation: ticker-enter 0.45s cubic-bezier(0.22, 1, 0.36, 1) forwards; }

  @keyframes ticker-leave {
    0%   { opacity: 1; transform: translateY(0%); }
    100% { opacity: 0; transform: translateY(-100%); }
  }
  @keyframes ticker-enter {
    0%   { opacity: 0; transform: translateY(100%); }
    100% { opacity: 1; transform: translateY(0%); }
  }

  @media (max-width: 480px) {
    .goal-ticker { padding: 9px 12px; }
    .goal-ticker-label { font-size: 9px; letter-spacing: 0.14em; }
    .goal-ticker-row { font-size: 12px; }
    .goal-ticker-meta { font-size: 10px; padding: 2px 7px; }
  }

  /* ---------- Component 3: Day Ring ---------- */
  .day-ring-row {
    display: flex;
    align-items: center;
    gap: 26px;
    flex-wrap: wrap;
    justify-content: center;
    margin: 8px 0 24px;
    padding: 18px 22px;
    background: rgba(255,255,255,0.04);
    border-radius: 16px;
    backdrop-filter: blur(24px) saturate(1.2);
    -webkit-backdrop-filter: blur(24px) saturate(1.2);
    box-shadow: 0 12px 40px rgba(0,0,0,0.45);
  }

  .day-ring-wrap {
    position: relative;
    width: 168px;
    height: 168px;
    flex: 0 0 168px;
  }

  .day-ring-svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  .day-ring-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    text-align: center;
  }

  .day-ring-percent {
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 40px;
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.04em;
    color: var(--text-primary);
    line-height: 1;
  }
  .day-ring-phase {
    margin-top: 5px;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 9.5px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: var(--text-tertiary);
  }
  .day-ring-clock {
    margin-top: 4px;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 10.5px;
    color: var(--text-tertiary);
  }

  .day-ring-info {
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-width: 280px;
  }
  .day-ring-status {
    font-size: 14px;
    font-weight: 700;
    color: var(--text-primary);
  }
  .day-ring-remaining {
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 12px;
    color: var(--text-secondary);
  }
  .day-ring-range {
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 11px;
    color: var(--text-tertiary);
  }

  .day-ring-track,
  .day-ring-fill {
    transition: stroke 0.7s cubic-bezier(0.22, 1, 0.36, 1),
                stroke-dashoffset 0.7s cubic-bezier(0.22, 1, 0.36, 1);
  }

  @media (max-width: 480px) {
    .day-ring-wrap { width: 144px; height: 144px; flex-basis: 144px; }
    .day-ring-percent { font-size: 32px; }
    .day-ring-status { font-size: 13px; }
  }

  /* ---------- Component 4: To Do List ---------- */
  .section { margin-top: 8px; }

  .section-title {
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-tertiary);
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 0 0 14px;
  }
  .section-title::before {
    content: '';
    width: 18px;
    height: 1px;
    background: var(--text-tertiary);
    opacity: 0.6;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, rgba(255,255,255,0.08), transparent);
  }

  .gm-card {
    background: rgba(255,255,255,0.04);
    border-radius: 16px;
    padding: 20px 22px;
    backdrop-filter: blur(24px) saturate(1.2);
    -webkit-backdrop-filter: blur(24px) saturate(1.2);
    box-shadow: 0 12px 40px rgba(0,0,0,0.45);
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
    transition: background 0.5s ease;
  }

  .gm-card.gm-all-done {
    background:
      radial-gradient(80% 50% at 50% 0%, rgba(107,227,164,0.10), transparent 70%),
      rgba(255,255,255,0.04);
  }
  .gm-card.gm-all-done .gm-progress-num,
  .gm-card.gm-all-done .gm-progress-label { color: var(--success); }

  .gm-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 14px;
  }

  .gm-header-left { display: flex; flex-direction: column; }

  .gm-eyebrow {
    font-size: 10.5px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--text-tertiary);
    margin-bottom: 6px;
  }

  .gm-progress-row {
    display: flex;
    align-items: baseline;
    gap: 6px;
  }

  .gm-progress-num {
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 42px;
    font-weight: 700;
    letter-spacing: -0.045em;
    font-variant-numeric: tabular-nums;
    color: var(--text-primary);
    line-height: 1;
  }

  .gm-progress-total {
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 18px;
    color: var(--text-tertiary);
  }

  .gm-progress-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    color: var(--text-tertiary);
    margin-left: 4px;
  }

  .gm-streak {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 12px;
    border-radius: 999px;
    background: rgba(255,255,255,0.04);
    color: var(--text-tertiary);
    border: 1px solid transparent;
    font-size: 11px;
    transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease;
  }
  .gm-streak.gm-streak-active {
    background: rgba(242,192,99,0.10);
    color: #F2C063;
    border-color: rgba(242,192,99,0.32);
  }
  .gm-streak-bolt { font-size: 13px; }
  .gm-streak.gm-streak-active .gm-streak-bolt {
    filter: drop-shadow(0 0 6px rgba(242,192,99,0.6));
  }
  .gm-streak-num {
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-variant-numeric: tabular-nums;
    font-weight: 700;
  }
  .gm-streak-label {
    text-transform: uppercase;
    letter-spacing: 0.10em;
  }

  .gm-bar {
    display: flex;
    flex-direction: row;
    gap: 4px;
    height: 6px;
    margin-bottom: 16px;
  }
  .gm-bar:empty { display: none; }
  .gm-bar-seg {
    flex: 1;
    height: 6px;
    border-radius: 3px;
    background: rgba(255,255,255,0.06);
    transition: background 0.3s ease, box-shadow 0.3s ease;
  }
  .gm-bar-seg.gm-bar-seg-done {
    background: #6BE3A4;
    box-shadow: 0 0 6px rgba(107,227,164,0.40);
  }

  .goal-list {
    list-style: none;
    margin: 0;
    padding: 0;
  }

  .empty-state {
    font-size: 12px;
    font-style: italic;
    color: var(--text-tertiary);
    padding: 14px 0;
    text-align: center;
  }

  .goal-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    margin-bottom: 6px;
    background: rgba(255,255,255,0.035);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px;
    transition: background 0.2s ease, opacity 0.3s ease, box-shadow 0.3s ease;
    position: relative;
  }
  .goal-item:hover {
    background: rgba(255,255,255,0.06);
  }
  .goal-item.is-drag-over { border-top-color: rgba(255,255,255,0.6); }

  .goal-item.is-done {
    opacity: 0.45;
    background: rgba(107,227,164,0.04);
  }
  .goal-item.is-done .goal-text {
    text-decoration: line-through;
    text-decoration-color: rgba(255,255,255,0.4);
  }

  .goal-item.is-queued {
    background: rgba(242,192,99,0.10);
    box-shadow: inset 3px 0 0 0 #F2C063;
  }
  .goal-item.is-queued .goal-text { color: #FFE2A8; }

  .goal-item.is-queue-flashing { animation: gm-queue-flash 0.48s ease; }
  @keyframes gm-queue-flash {
    0%   { background: rgba(242,192,99,0.10); transform: scale(1); }
    50%  { background: rgba(242,192,99,0.32); transform: scale(1.015); }
    100% { background: rgba(242,192,99,0.10); transform: scale(1); }
  }

  .gm-drag-handle {
    width: 14px;
    flex: 0 0 14px;
    cursor: grab;
    color: var(--text-tertiary);
    opacity: 0;
    transition: opacity 0.2s ease;
    letter-spacing: -2px;
    user-select: none;
    font-size: 14px;
    line-height: 1;
  }
  .gm-drag-handle:active { cursor: grabbing; }
  .goal-item:hover .gm-drag-handle { opacity: 1; }

  .gm-checkbox {
    appearance: none;
    -webkit-appearance: none;
    width: 22px;
    height: 22px;
    flex: 0 0 22px;
    border-radius: 7px;
    border: 1.5px solid rgba(255,255,255,0.18);
    background: rgba(0,0,0,0.4);
    cursor: pointer;
    position: relative;
    margin: 0;
    transition: background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
  }
  .gm-checkbox:hover { border-color: rgba(255,255,255,0.32); }
  .gm-checkbox:disabled { cursor: not-allowed; }
  .gm-checkbox:checked {
    background: #6BE3A4;
    border-color: #6BE3A4;
    box-shadow: 0 0 12px rgba(107,227,164,0.40);
  }
  .gm-checkbox::after {
    content: '';
    position: absolute;
    left: 6px; top: 2px;
    width: 6px; height: 11px;
    border: solid #0A0A0B;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg) scale(0);
    transition: transform 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .gm-checkbox:checked::after { transform: rotate(45deg) scale(1); }

  .goal-text {
    flex: 1;
    font-size: 14px;
    color: var(--text-primary);
    cursor: text;
    outline: none;
    word-break: break-word;
  }
  .goal-text[contenteditable="true"] {
    outline: 1px solid rgba(255,255,255,0.18);
    outline-offset: 4px;
    border-radius: 3px;
  }

  .gm-queue-btn,
  .goal-delete {
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px;
    color: var(--text-tertiary);
    font-size: 14px;
    line-height: 1;
    transition: color 0.2s ease, opacity 0.2s ease, transform 0.2s ease;
  }

  .gm-queue-btn {
    opacity: 0.55;
  }
  .gm-queue-btn:hover { opacity: 1; }
  .gm-queue-btn.is-active {
    color: #F2C063;
    opacity: 1;
    filter: drop-shadow(0 0 4px rgba(242,192,99,0.65));
  }
  .gm-queue-btn:disabled { cursor: not-allowed; opacity: 0.3; }

  .goal-delete {
    opacity: 0.5;
  }
  .goal-item:hover .goal-delete { opacity: 1; }
  .goal-delete:hover { color: var(--danger); }

  .gm-show-more {
    display: block;
    width: 100%;
    margin: 8px 0 4px;
    padding: 10px 14px;
    border: 1px dashed rgba(255,255,255,0.18);
    border-radius: 12px;
    background: transparent;
    color: var(--text-tertiary);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: color 0.2s ease, border-color 0.2s ease;
  }
  .gm-show-more:hover { color: var(--text-primary); border-color: rgba(255,255,255,0.32); }

  .gm-push-btn {
    display: block;
    width: 100%;
    margin: 8px 0 4px;
    padding: 11px 14px;
    border: 1px dashed rgba(255,255,255,0.18);
    border-radius: 12px;
    background: transparent;
    color: var(--text-tertiary);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: color 0.2s ease, border-color 0.2s ease;
  }
  .gm-push-btn:hover { color: var(--text-primary); border-color: rgba(255,255,255,0.32); }

  .goal-input-wrap.gm-input-wrap {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid rgba(255,255,255,0.06);
  }

  .goal-input {
    flex: 1;
    min-width: 0;
    padding: 11px 14px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.10);
    background: rgba(255,255,255,0.04);
    color: var(--text-primary);
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s ease, background 0.2s ease;
  }
  .goal-input::placeholder { color: var(--text-tertiary); }
  .goal-input:focus { border-color: rgba(255,255,255,0.32); background: rgba(255,255,255,0.06); }

  .goal-add-btn {
    padding: 11px 20px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(180deg, #FFFFFF 0%, #E8E5DD 100%);
    color: #0A0A0B;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    box-shadow:
      0 6px 18px rgba(0,0,0,0.35),
      inset 0 1px 0 rgba(255,255,255,0.6);
    transition: transform 0.15s ease, filter 0.15s ease;
  }
  .goal-add-btn:hover { transform: translateY(-1px); filter: brightness(1.05); }

  .goal-polish-btn {
    padding: 11px 20px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.10);
    background: rgba(255,255,255,0.04);
    color: var(--text-primary);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s ease, border-color 0.15s ease;
  }
  .goal-polish-btn:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.20); }

  .polish-status {
    width: 100%;
    margin-top: 8px;
    font-size: 11px;
    color: var(--text-tertiary);
    transition: color 0.2s ease;
  }
  .polish-status.is-error { color: var(--danger); }

  /* PLAN TOMORROW */
  .gm-card-tomorrow .gm-progress-row { display: none; }

  .gm-tomorrow-sub {
    font-size: 12px;
    color: var(--text-tertiary);
    margin-top: 0;
  }

  .gm-tomorrow-count {
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-variant-numeric: tabular-nums;
    color: var(--text-tertiary);
    align-self: center;
  }
</style>
</head>
<body>

  <h1 class="dash-title">My Dashboard</h1>

  <div class="ticker-row">
    <div class="goal-ticker" id="goalTicker" aria-live="polite" aria-atomic="true">
      <div class="goal-ticker-led"><span class="goal-ticker-led-dot"></span></div>
      <div class="goal-ticker-label">GOALS</div>
      <div class="goal-ticker-stage" id="goalTickerStage">
        <div class="goal-ticker-row">
          <span class="goal-ticker-status" data-status="">—</span>
          <span class="goal-ticker-text">Loading…</span>
        </div>
      </div>
      <div class="goal-ticker-meta" id="goalTickerMeta">0/0</div>
    </div>
  </div>

  <div class="day-ring-row">
    <div class="day-ring-wrap">
      <svg class="day-ring-svg" viewBox="0 0 120 120">
        <defs>
          <filter id="ringGlow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="1.6" result="blur"/>
            <feMerge>
              <feMergeNode in="blur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
        </defs>
        <circle class="day-ring-track" cx="60" cy="60" r="52"
                fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="8"/>
        <circle class="day-ring-fill" id="dayRingFill" cx="60" cy="60" r="52"
                fill="none" stroke="#FFD89E" stroke-width="8"
                stroke-linecap="round"
                transform="rotate(-90 60 60)"
                filter="url(#ringGlow)"/>
      </svg>
      <div class="day-ring-overlay">
        <div class="day-ring-percent" id="dayRingPercent">—</div>
        <div class="day-ring-phase" id="dayRingPhase">SLEEPING</div>
        <div class="day-ring-clock" id="dayRingClock">—</div>
      </div>
    </div>
    <div class="day-ring-info">
      <div class="day-ring-status" id="dayRingStatus">😴 Still sleeping</div>
      <div class="day-ring-remaining" id="dayRingRemaining">—</div>
      <div class="day-ring-range">8:00 AM – 12:00 AM</div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">To Do List</div>

    <!-- TODAY card -->
    <div class="gm-card" id="todayCard">
      <div class="gm-header">
        <div class="gm-header-left">
          <div class="gm-eyebrow" id="todayLabel">Today</div>
          <div class="gm-progress-row">
            <span class="gm-progress-num" id="gmProgressNum">0</span>
            <span class="gm-progress-total" id="gmProgressTotal">/ 0</span>
            <span class="gm-progress-label" id="gmProgressLabel">no goals yet</span>
          </div>
        </div>
        <div class="gm-streak" id="gmStreak">
          <span class="gm-streak-bolt">⚡</span>
          <span class="gm-streak-num" id="gmStreakNum">0</span>
          <span class="gm-streak-label">day streak</span>
        </div>
      </div>

      <div class="gm-bar" id="gmBar"></div>

      <ul id="goalList" class="goal-list gm-list"></ul>
      <div id="emptyState" class="empty-state">No goals for today yet — add one below.</div>

      <button id="gmPushBtn" class="gm-push-btn" style="display:none;">Push remaining → tomorrow</button>

      <div class="goal-input-wrap gm-input-wrap">
        <input id="goalInput" class="goal-input" type="text" placeholder="Add a goal for today…" />
        <button id="goalAddBtn"    class="goal-add-btn">+ Add</button>
        <button id="goalPolishBtn" class="goal-polish-btn">✨ Polish</button>
        <div id="polishStatus" class="polish-status"></div>
      </div>
    </div>

    <!-- PLAN TOMORROW card -->
    <div class="gm-card gm-card-tomorrow" id="tomorrowCard">
      <div class="gm-header">
        <div class="gm-header-left">
          <div class="gm-eyebrow" id="tomorrowLabel">Plan tomorrow</div>
          <div class="gm-tomorrow-sub">Write tonight, locked until 6 AM.</div>
        </div>
        <div class="gm-tomorrow-count" id="gmTomorrowCount">0 planned</div>
      </div>

      <ul id="tomorrowList" class="goal-list gm-list"></ul>
      <div id="tomorrowEmpty" class="empty-state">Nothing planned for tomorrow yet</div>

      <div class="goal-input-wrap gm-input-wrap">
        <input id="tomorrowInput" class="goal-input" type="text" placeholder="Add a goal for tomorrow…" />
        <button id="tomorrowAddBtn"    class="goal-add-btn">+ Add</button>
        <button id="tomorrowPolishBtn" class="goal-polish-btn">✨ Polish</button>
        <div id="tomorrowStatus" class="polish-status"></div>
      </div>
    </div>
  </div>

<script>
(function () {
  'use strict';

  const ANTHROPIC_API_KEY = '';

  /* ---------- storage helpers ---------- */
  function storeGet(key) {
    try { const v = localStorage.getItem(key); return v == null ? null : JSON.parse(v); }
    catch (e) { return null; }
  }
  function storeSet(key, value) {
    try { localStorage.setItem(key, JSON.stringify(value)); }
    catch (e) {}
    if (typeof key === 'string' && key.indexOf('goals:') === 0) {
      try { window.dispatchEvent(new CustomEvent('goals-changed')); } catch (e) {}
    }
  }
  function storeDelete(key) {
    try { localStorage.removeItem(key); } catch (e) {}
    if (typeof key === 'string' && key.indexOf('goals:') === 0) {
      try { window.dispatchEvent(new CustomEvent('goals-changed')); } catch (e) {}
    }
  }
  function storeListKeys(prefix) {
    const out = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.indexOf(prefix) === 0) out.push(k);
    }
    return out;
  }

  /* ---------- date helpers ---------- */
  function pad2(n) { return n < 10 ? '0' + n : '' + n; }
  function fmtYMD(d) {
    return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate());
  }
  function getActiveDateString() {
    const now = new Date();
    if (now.getHours() < 6) {
      const d = new Date(now); d.setDate(d.getDate() - 1);
      return fmtYMD(d);
    }
    return fmtYMD(now);
  }
  function getTomorrowDateString() {
    const now = new Date();
    if (now.getHours() < 6) return fmtYMD(now);
    const d = new Date(now); d.setDate(d.getDate() + 1);
    return fmtYMD(d);
  }
  function formatDate(ymd) {
    const parts = ymd.split('-').map(function (s) { return parseInt(s, 10); });
    const d = new Date(parts[0], parts[1] - 1, parts[2]);
    const wd = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];
    const mo = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()];
    return wd + ', ' + mo + ' ' + d.getDate();
  }

  /* ---------- rollover ---------- */
  function rolloverOldGoals() {
    const active = getActiveDateString();
    const todayKey = 'goals:' + active;
    const today = storeGet(todayKey) || [];
    const seen = {};
    today.forEach(function (g) { if (g && typeof g.text === 'string') seen[g.text] = true; });
    const keys = storeListKeys('goals:');
    let changed = false;
    keys.forEach(function (k) {
      const ymd = k.slice('goals:'.length);
      if (ymd >= active) return;
      const list = storeGet(k) || [];
      list.forEach(function (g) {
        if (!g || g.done) return;
        if (seen[g.text]) return;
        today.push({ text: g.text, done: false });
        seen[g.text] = true;
        changed = true;
      });
      storeDelete(k);
    });
    if (changed) storeSet(todayKey, today);
  }

  /* ---------- streak ---------- */
  function updateStreak() {
    const today = getActiveDateString();
    const state = storeGet('goal_streak_v1') || { count: 0, lastProcessedDate: null };
    let count = state.count || 0;
    let last = state.lastProcessedDate || null;
    const all = storeListKeys('goals:').map(function (k) { return k.slice('goals:'.length); }).sort();
    for (let i = 0; i < all.length; i++) {
      const ymd = all[i];
      if (ymd >= today) continue;
      if (last && ymd <= last) continue;
      const list = storeGet('goals:' + ymd) || [];
      if (list.length === 0) { last = ymd; continue; }
      const allDone = list.every(function (g) { return g && g.done; });
      count = allDone ? count + 1 : 0;
      last = ymd;
    }
    storeSet('goal_streak_v1', { count: count, lastProcessedDate: last });
  }

  /* ---------- day ring ---------- */
  const WAKE_HOUR  = 8;
  const SLEEP_HOUR = 24;
  const RING_C     = 2 * Math.PI * 52;

  const SUN_PALETTE = [
    [0,    [255, 216, 158]],
    [12.5, [255, 205, 121]],
    [25,   [255, 227, 143]],
    [37.5, [255, 183, 106]],
    [50,   [255, 149,  89]],
    [62.5, [243, 111,  79]],
    [75,   [226,  93, 122]],
    [87.5, [123,  91, 176]],
    [100,  [ 47,  58, 102]]
  ];

  function lerp(a, b, t) { return a + (b - a) * t; }
  function rgbToCss(r, g, b) { return 'rgb(' + Math.round(r) + ',' + Math.round(g) + ',' + Math.round(b) + ')'; }
  function sunColor(percent) {
    if (percent <= 0) return rgbToCss.apply(null, SUN_PALETTE[0][1]);
    if (percent >= 100) return rgbToCss.apply(null, SUN_PALETTE[SUN_PALETTE.length - 1][1]);
    for (let i = 0; i < SUN_PALETTE.length - 1; i++) {
      const a = SUN_PALETTE[i], b = SUN_PALETTE[i + 1];
      if (percent >= a[0] && percent <= b[0]) {
        const t = (percent - a[0]) / (b[0] - a[0]);
        return rgbToCss(lerp(a[1][0], b[1][0], t), lerp(a[1][1], b[1][1], t), lerp(a[1][2], b[1][2], t));
      }
    }
    return rgbToCss.apply(null, SUN_PALETTE[0][1]);
  }

  function fmtClock(d) {
    let h = d.getHours();
    const m = d.getMinutes();
    const ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12; if (h === 0) h = 12;
    return h + ':' + pad2(m) + ' ' + ampm;
  }

  function fmtRemaining(hours) {
    if (hours < 0) hours = 0;
    const h = Math.floor(hours);
    const m = Math.round((hours - h) * 60);
    return h + 'h ' + m + 'm';
  }

  function updateDayBar() {
    const fill      = document.getElementById('dayRingFill');
    const percentEl = document.getElementById('dayRingPercent');
    const phaseEl   = document.getElementById('dayRingPhase');
    const clockEl   = document.getElementById('dayRingClock');
    const statusEl  = document.getElementById('dayRingStatus');
    const remEl     = document.getElementById('dayRingRemaining');

    const now = new Date();
    const hours = now.getHours() + now.getMinutes() / 60 + now.getSeconds() / 3600;

    fill.setAttribute('stroke-dasharray', RING_C);

    if (hours < WAKE_HOUR) {
      const offset = RING_C;
      fill.setAttribute('stroke-dashoffset', offset);
      fill.setAttribute('stroke', '#4D4B47');
      percentEl.textContent = '—';
      phaseEl.textContent = 'SLEEPING';
      statusEl.textContent = '😴 Still sleeping';
      const left = WAKE_HOUR - hours;
      remEl.textContent = fmtRemaining(left) + ' until wake-up';
    } else if (hours < SLEEP_HOUR) {
      const percent = (hours - WAKE_HOUR) / (SLEEP_HOUR - WAKE_HOUR) * 100;
      const offset = RING_C * (1 - percent / 100);
      fill.setAttribute('stroke-dashoffset', offset);
      fill.setAttribute('stroke', sunColor(percent));
      percentEl.textContent = Math.floor(percent) + '%';
      let phase, status;
      if (percent < 25)      { phase = 'MORNING';   status = '☀️ Morning — fresh start'; }
      else if (percent < 50) { phase = 'MIDDAY';    status = '⚡ Midday — keep moving'; }
      else if (percent < 75) { phase = 'AFTERNOON'; status = '🔥 Afternoon — push it'; }
      else if (percent < 90) { phase = 'EVENING';   status = '⏳ Evening — wrap up'; }
      else                   { phase = 'BEDTIME';   status = '🌙 Bedtime soon'; }
      phaseEl.textContent = phase;
      statusEl.textContent = status;
      remEl.textContent = fmtRemaining(SLEEP_HOUR - hours) + ' awake time left';
    } else {
      fill.setAttribute('stroke-dashoffset', 0);
      fill.setAttribute('stroke', '#E25D7A');
      percentEl.textContent = '100%';
      phaseEl.textContent = 'PAST BEDTIME';
      statusEl.textContent = '⚠️ Past bedtime';
      remEl.textContent = 'Sleep!';
    }

    clockEl.textContent = fmtClock(now);
  }

  /* ---------- to-do list rendering ---------- */
  function getTodayKey()    { return 'goals:' + getActiveDateString(); }
  function getTomorrowKey() { return 'goals:' + getTomorrowDateString(); }

  function renderTodayHeader() {
    const goals = storeGet(getTodayKey()) || [];
    const total = goals.length;
    const done = goals.filter(function (g) { return g && g.done; }).length;
    document.getElementById('gmProgressNum').textContent = String(done);
    document.getElementById('gmProgressTotal').textContent = '/ ' + total;
    const labelEl = document.getElementById('gmProgressLabel');
    if (total === 0) labelEl.textContent = 'no goals yet';
    else if (done === total) labelEl.textContent = 'all done — solid day';
    else labelEl.textContent = 'complete';

    const bar = document.getElementById('gmBar');
    bar.innerHTML = '';
    goals.forEach(function (g) {
      const seg = document.createElement('div');
      seg.className = 'gm-bar-seg' + (g && g.done ? ' gm-bar-seg-done' : '');
      bar.appendChild(seg);
    });

    const card = document.getElementById('todayCard');
    if (total > 0 && done === total) card.classList.add('gm-all-done');
    else card.classList.remove('gm-all-done');

    const pushBtn = document.getElementById('gmPushBtn');
    pushBtn.style.display = (total > 0 && done < total) ? 'block' : 'none';

    document.getElementById('todayLabel').textContent = 'Today — ' + formatDate(getActiveDateString());
  }

  function renderStreak() {
    const state = storeGet('goal_streak_v1') || { count: 0 };
    const num = state.count || 0;
    document.getElementById('gmStreakNum').textContent = String(num);
    const pill = document.getElementById('gmStreak');
    if (num > 0) pill.classList.add('gm-streak-active');
    else pill.classList.remove('gm-streak-active');
  }

  function renderTomorrowCount() {
    const goals = storeGet(getTomorrowKey()) || [];
    document.getElementById('gmTomorrowCount').textContent = goals.length + ' planned';
    document.getElementById('tomorrowLabel').textContent = 'Plan tomorrow — ' + formatDate(getTomorrowDateString());
  }

  function makeInlineEdit(el, onCommit) {
    el.addEventListener('click', function () {
      if (el.getAttribute('contenteditable') === 'true') return;
      const original = el.textContent;
      el.setAttribute('contenteditable', 'true');
      el.focus();
      const range = document.createRange();
      range.selectNodeContents(el);
      range.collapse(false);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);

      function commit() {
        el.removeAttribute('contenteditable');
        const txt = el.textContent.trim();
        if (txt && txt !== original) onCommit(txt);
        else el.textContent = original;
      }
      function cancel() {
        el.removeAttribute('contenteditable');
        el.textContent = original;
      }

      function onKey(e) {
        if (e.key === 'Enter') { e.preventDefault(); el.blur(); }
        else if (e.key === 'Escape') { e.preventDefault(); cancel(); cleanup(); }
      }
      function onBlur() { commit(); cleanup(); }
      function cleanup() {
        el.removeEventListener('keydown', onKey);
        el.removeEventListener('blur', onBlur);
      }
      el.addEventListener('keydown', onKey);
      el.addEventListener('blur', onBlur);
    });
  }

  function wireDragReorder(li, key, idx, onReorder) {
    li.setAttribute('draggable', 'true');
    li.addEventListener('dragstart', function (e) {
      e.dataTransfer.effectAllowed = 'move';
      try { e.dataTransfer.setData('text/plain', String(idx)); } catch (er) {}
    });
    li.addEventListener('dragover', function (e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      li.classList.add('is-drag-over');
      li.style.borderTopColor = 'rgba(255,255,255,0.6)';
    });
    li.addEventListener('dragleave', function () {
      li.classList.remove('is-drag-over');
      li.style.borderTopColor = '';
    });
    li.addEventListener('drop', function (e) {
      e.preventDefault();
      li.classList.remove('is-drag-over');
      li.style.borderTopColor = '';
      const from = parseInt(e.dataTransfer.getData('text/plain'), 10);
      if (isNaN(from) || from === idx) return;
      onReorder(from, idx);
    });
  }

  function buildGoalRow(goal, idx, key, readOnly) {
    const li = document.createElement('li');
    li.className = 'goal-item';
    if (goal.done)   li.classList.add('is-done');
    if (goal.queued) li.classList.add('is-queued');

    const handle = document.createElement('span');
    handle.className = 'gm-drag-handle';
    handle.textContent = '⋮⋮';
    li.appendChild(handle);

    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.className = 'gm-checkbox';
    cb.checked = !!goal.done;
    if (readOnly) {
      cb.disabled = true;
      cb.title = 'Activates at 6 AM tomorrow';
    } else {
      cb.addEventListener('change', function () {
        const goals = storeGet(key) || [];
        if (!goals[idx]) return;
        goals[idx].done = cb.checked;
        if (cb.checked) goals[idx].doneAt = Date.now();
        else delete goals[idx].doneAt;
        storeSet(key, goals);
        if (key === getTodayKey()) loadToday(); else loadTomorrow();
      });
    }
    li.appendChild(cb);

    const text = document.createElement('span');
    text.className = 'goal-text';
    text.textContent = goal.text || '';
    makeInlineEdit(text, function (newText) {
      const goals = storeGet(key) || [];
      if (!goals[idx]) return;
      goals[idx].text = newText;
      storeSet(key, goals);
      if (key === getTodayKey()) loadToday(); else loadTomorrow();
    });
    li.appendChild(text);

    const queueBtn = document.createElement('button');
    queueBtn.className = 'gm-queue-btn' + (goal.queued ? ' is-active' : '');
    queueBtn.type = 'button';
    queueBtn.textContent = '⚡';
    queueBtn.title = 'Queue for productivity window';
    if (readOnly) queueBtn.disabled = true;
    else {
      queueBtn.addEventListener('click', function () {
        const goals = storeGet(key) || [];
        if (!goals[idx]) return;
        goals[idx].queued = !goals[idx].queued;
        storeSet(key, goals);
        li.classList.add('is-queue-flashing');
        setTimeout(function () {
          if (key === getTodayKey()) loadToday(); else loadTomorrow();
        }, 480);
      });
    }
    li.appendChild(queueBtn);

    const del = document.createElement('button');
    del.className = 'goal-delete';
    del.type = 'button';
    del.textContent = '×';
    del.addEventListener('click', function () {
      const goals = storeGet(key) || [];
      goals.splice(idx, 1);
      storeSet(key, goals);
      if (key === getTodayKey()) loadToday(); else loadTomorrow();
    });
    li.appendChild(del);

    wireDragReorder(li, key, idx, function (from, to) {
      const goals = storeGet(key) || [];
      const item = goals.splice(from, 1)[0];
      if (!item) return;
      goals.splice(to, 0, item);
      storeSet(key, goals);
      if (key === getTodayKey()) loadToday(); else loadTomorrow();
    });

    return li;
  }

  function renderListInto(goals, listEl, emptyEl, key, readOnly) {
    listEl.innerHTML = '';
    if (!goals.length) {
      emptyEl.style.display = 'block';
    } else {
      emptyEl.style.display = 'none';
      const limit = 5;
      const overflow = goals.length > limit;
      const visible = overflow ? goals.slice(0, limit) : goals;
      visible.forEach(function (g, i) { listEl.appendChild(buildGoalRow(g, i, key, readOnly)); });

      if (overflow) {
        const showKey = '__show_more_' + key;
        let expanded = listEl.dataset[showKey] === '1';
        const moreBtn = document.createElement('button');
        moreBtn.className = 'gm-show-more';
        moreBtn.type = 'button';
        function rebuild() {
          // Re-render dynamically when expanded
          listEl.innerHTML = '';
          const arr = expanded ? goals : goals.slice(0, limit);
          arr.forEach(function (g, i) { listEl.appendChild(buildGoalRow(g, i, key, readOnly)); });
          listEl.appendChild(moreBtn);
          moreBtn.textContent = expanded
            ? 'Show less ▴'
            : 'Show ' + (goals.length - limit) + ' more ▾';
        }
        moreBtn.addEventListener('click', function () { expanded = !expanded; rebuild(); });
        rebuild();
      }
    }

    if (key === getTodayKey()) renderTodayHeader();
    else renderTomorrowCount();
  }

  function loadToday() {
    const list = document.getElementById('goalList');
    const empty = document.getElementById('emptyState');
    const goals = storeGet(getTodayKey()) || [];
    renderListInto(goals, list, empty, getTodayKey(), false);
  }

  function loadTomorrow() {
    const list = document.getElementById('tomorrowList');
    const empty = document.getElementById('tomorrowEmpty');
    const goals = storeGet(getTomorrowKey()) || [];
    renderListInto(goals, list, empty, getTomorrowKey(), true);
  }

  /* ---------- push remaining ---------- */
  document.getElementById('gmPushBtn').addEventListener('click', function () {
    const today = storeGet(getTodayKey()) || [];
    const remaining = today.filter(function (g) { return g && !g.done; });
    if (!remaining.length) return;
    if (!confirm('Push ' + remaining.length + ' unchecked goal(s) to tomorrow?')) return;
    const tomorrow = storeGet(getTomorrowKey()) || [];
    const seen = {};
    tomorrow.forEach(function (g) { if (g && g.text) seen[g.text] = true; });
    remaining.forEach(function (g) {
      if (seen[g.text]) return;
      tomorrow.push({ text: g.text, done: false });
      seen[g.text] = true;
    });
    storeSet(getTomorrowKey(), tomorrow);
    storeSet(getTodayKey(), today.filter(function (g) { return g && g.done; }));
    loadToday();
    loadTomorrow();
  });

  /* ---------- add + polish ---------- */
  function showStatus(el, msg, isError, ms) {
    el.textContent = msg;
    el.classList.toggle('is-error', !!isError);
    if (el._t) clearTimeout(el._t);
    el._t = setTimeout(function () { el.textContent = ''; el.classList.remove('is-error'); }, ms || 3500);
  }

  async function polishOne(raw) {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': ANTHROPIC_API_KEY,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: 'Clean up exactly ONE goal and return it as a one-element JSON array of strings. No preamble, no code fences, no commentary. Goal: ' + raw
        }]
      })
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const text = (data.content && data.content[0] && data.content[0].text) || '';
    const trimmed = text.trim().replace(/^```(?:json)?/i, '').replace(/```$/, '').trim();
    const arr = JSON.parse(trimmed);
    if (!Array.isArray(arr) || !arr.length || typeof arr[0] !== 'string') throw new Error('bad shape');
    return arr[0];
  }

  function makeAddHandlers(input, addBtn, polishBtn, key, statusEl, reload) {
    function add(text) {
      const t = (text || '').trim();
      if (!t) return;
      const goals = storeGet(key) || [];
      goals.push({ text: t, done: false });
      storeSet(key, goals);
      input.value = '';
      reload();
    }
    addBtn.addEventListener('click', function () { add(input.value); });
    input.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') { e.preventDefault(); add(input.value); }
    });
    polishBtn.addEventListener('click', async function () {
      const raw = input.value.trim();
      if (!raw) return;
      if (!ANTHROPIC_API_KEY) {
        add(raw);
        showStatus(statusEl, 'Polish needs an Anthropic API key — added as-typed.', false);
        return;
      }
      polishBtn.disabled = true;
      try {
        const cleaned = await polishOne(raw);
        const goals = storeGet(key) || [];
        goals.push({ text: cleaned, done: false });
        storeSet(key, goals);
        input.value = '';
        reload();
      } catch (e) {
        const goals = storeGet(key) || [];
        goals.push({ text: raw, done: false });
        storeSet(key, goals);
        input.value = '';
        reload();
        showStatus(statusEl, 'Polish failed — added as-typed.', true);
      } finally {
        polishBtn.disabled = false;
      }
    });
  }

  /* ---------- ticker ---------- */
  let cycleIdx = 0;
  let firstTick = true;

  function buildTickerItems() {
    const goals = storeGet(getTodayKey()) || [];
    const total = goals.length;
    const done = goals.filter(function (g) { return g && g.done; }).length;
    let items;
    if (total === 0) {
      items = [{ status: 'empty', text: 'No goals set for today — add one to get rolling.' }];
    } else if (done === total) {
      items = [{ status: 'done', text: '✓ All goals done — solid day.' }];
    } else {
      items = goals.filter(function (g) { return g && !g.done; })
                   .map(function (g) { return { status: 'pending', text: g.text || '' }; });
    }
    return { items: items, done: done, total: total };
  }

  function makeTickerRow(item) {
    const row = document.createElement('div');
    row.className = 'goal-ticker-row';

    const status = document.createElement('span');
    status.className = 'goal-ticker-status';
    status.setAttribute('data-status', item.status || '');
    status.textContent = item.status === 'done' ? '✓' : (item.status === 'pending' ? '○' : '·');

    const text = document.createElement('span');
    text.className = 'goal-ticker-text';
    text.textContent = item.text || '';

    row.appendChild(status);
    row.appendChild(text);
    return row;
  }

  function tick() {
    const stage = document.getElementById('goalTickerStage');
    const meta  = document.getElementById('goalTickerMeta');
    const data  = buildTickerItems();
    if (cycleIdx >= data.items.length) cycleIdx = 0;
    const item = data.items[cycleIdx];

    meta.textContent = data.done + '/' + data.total;

    const newRow = makeTickerRow(item);

    if (firstTick) {
      stage.innerHTML = '';
      stage.appendChild(newRow);
      firstTick = false;
    } else {
      const existing = stage.querySelector('.goal-ticker-row');
      if (existing) {
        existing.classList.add('is-leaving');
        setTimeout(function () { if (existing.parentNode) existing.parentNode.removeChild(existing); }, 460);
      }
      newRow.classList.add('is-entering');
      stage.appendChild(newRow);
    }

    cycleIdx = (cycleIdx + 1) % Math.max(1, data.items.length);
  }

  function startTicker() {
    tick();
    setInterval(tick, 5000);
  }

  window.addEventListener('goals-changed', function () {
    cycleIdx = 0;
    tick();
  });

  /* ---------- boot ---------- */
  function boot() {
    rolloverOldGoals();
    updateStreak();

    makeAddHandlers(
      document.getElementById('goalInput'),
      document.getElementById('goalAddBtn'),
      document.getElementById('goalPolishBtn'),
      getTodayKey(),
      document.getElementById('polishStatus'),
      loadToday
    );
    makeAddHandlers(
      document.getElementById('tomorrowInput'),
      document.getElementById('tomorrowAddBtn'),
      document.getElementById('tomorrowPolishBtn'),
      getTomorrowKey(),
      document.getElementById('tomorrowStatus'),
      loadTomorrow
    );

    loadToday();
    loadTomorrow();
    renderStreak();

    updateDayBar();
    setInterval(updateDayBar, 60 * 1000);

    startTicker();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', boot);
  } else {
    boot();
  }
})();
</script>
</body>
</html>
